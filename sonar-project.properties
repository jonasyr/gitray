sonar.projectKey=gitray-dev
sonar.organization=gitray-org
sonar.host.url=https://sonarcloud.io
sonar.token=${SONAR_TOKEN}

sonar.sources=.

// --- Exclusion Patterns for Accurate Code Coverage ---
// The following patterns exclude configuration files, build scripts, documentation, and static assets
// from code coverage metrics. This ensures SonarQube only reports coverage for actual application code.
// Excluded:
// - Configuration files (*.config.js, *.config.ts, *.config.cjs, *.config.mjs, etc.)
// - Build configs (tsconfig.json, vite.config.ts)
// - Package definitions (package.json)
// - Tooling configs (.eslintrc, postcss.config.js, etc.)
// - Vitest setup files (test-setup.ts, vitest.config.ts, etc.)
// - Documentation (*.md)
// - Assets/static files (public/, assets/, static/, etc.)
// - Mock files (__mocks__/**)
// - Test files (__tests__/**)
// - Compiled JavaScript files (from TypeScript) - ADDED
// - Build output directories - ADDED
sonar.exclusions=**/*.config.js,**/*.config.ts,**/*.config.cjs,**/tsconfig.json,**/vite.config.ts,**/package.json,**/.eslintrc,**/.eslintrc.*,**/test-setup.ts,**/*.md,**/docs/**,**/public/**,**/assets/**,**/static/**,**/__mocks__/**,**/__tests__/**,**/*.js,**/dist/**,**/*.js.map,**/main.tsx,apps/backend/perf/load-test.ts

// --- Specifically Include Source TypeScript Files ---
// This ensures SonarQube focuses on analyzing your actual source code
sonar.inclusions=**/*.ts,**/*.tsx

sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.javascript.lcov.reportPaths=**/lcov.info

